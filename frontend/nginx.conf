server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    # --- API und Medien an das FastAPI-Backend weiterreichen ---
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://backend:8000/uploads/;
    }

    location /thumbnails/ {
        proxy_pass http://backend:8000/thumbnails/;
    }

    # --- Captive-Portal-Erkennung der Betriebssysteme ---
    # dnsmasq auf dem Rock leitet ALLE DNS-Anfragen hierher (siehe network/dnsmasq.conf).
    # Diese Endpunkte müssen absichtlich NICHT die von iOS/Android/Windows erwartete
    # "alles ok"-Antwort liefern, damit das Betriebssystem den Captive-Portal-Browser öffnet.
    location = /hotspot-detect.html {
        return 200 '<!doctype html><meta http-equiv="refresh" content="0; url=/">';
        add_header Content-Type text/html;
    }

    location = /library/test/success.html {
        return 200 '<!doctype html><meta http-equiv="refresh" content="0; url=/">';
        add_header Content-Type text/html;
    }

    location = /generate_204 {
        return 200 '<!doctype html><meta http-equiv="refresh" content="0; url=/">';
        add_header Content-Type text/html;
    }

    location = /gen_204 {
        return 200 '<!doctype html><meta http-equiv="refresh" content="0; url=/">';
        add_header Content-Type text/html;
    }

    location = /connecttest.txt {
        return 200 'Helmpflicht Hub';
        add_header Content-Type text/plain;
    }

    location = /ncsi.txt {
        return 200 'Helmpflicht Hub';
        add_header Content-Type text/plain;
    }

    # --- Statische PWA-Assets ---
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- SPA-Fallback: alles andere liefert die App aus ---
    # Fängt zugleich jede über DNS-Wildcard hierher umgeleitete Domain/Pfad ab.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
