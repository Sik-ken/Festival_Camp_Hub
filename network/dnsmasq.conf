# dnsmasq-Konfiguration für den Rock 4C+ (192.168.4.2)
# Zweck: DNS für das gesamte Camp-Netz übernehmen. Der ESP32-S3 (192.168.4.1)
# macht ausschließlich WLAN/DHCP, sonst nichts (siehe docs/ARCHITECTURE.md).
#
# Installation auf dem Rock, siehe ROCK_SETUP.md Schritt "DNS & Captive Portal".
# Datei nach /etc/dnsmasq.d/helmpflicht-hub.conf kopieren.

# Nur auf dem WLAN-seitigen Interface lauschen (Name ggf. anpassen, siehe
# `ip a` auf dem Rock — meist eth0/end0, je nachdem wie der Rock am ESP32 hängt).
# interface=eth0
# bind-interfaces

# Kein eigener DHCP-Server (macht der ESP32 über esp32_nat_router)
no-dhcp-interface=*

# Feste Hostnamen für den Hub, alle zeigen auf den Rock selbst
address=/camp.local/192.168.4.2
address=/helmpflicht.local/192.168.4.2
address=/hub.local/192.168.4.2

# Wildcard: ALLE übrigen Domains ebenfalls auf den Rock umleiten.
# Das Camp-Netz hat keinen echten Internet-Uplink, daher ist das hier sicher
# und sorgt zugleich dafür, dass die Captive-Portal-Checks von iOS, Android
# und Windows (captive.apple.com, connectivitycheck.gstatic.com,
# msftconnecttest.com, ...) automatisch beim Rock landen, ohne jede Domain
# einzeln pflegen zu müssen.
address=/#/192.168.4.2

# Kein Upstream-DNS weiterreichen (kein Internet vorhanden)
no-resolv
no-poll

# Cache klein halten, läuft eh lokal
cache-size=150

log-queries
log-facility=/var/log/dnsmasq-helmpflicht.log
